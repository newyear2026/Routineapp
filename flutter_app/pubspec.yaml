name: routine_timer
description: 귀여운 감성 루틴 관리 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & 애니메이션
  cupertino_icons: ^1.0.2
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  
  # 상태 관리
  provider: ^6.1.1
  
  # 로컬 저장소
  shared_preferences: ^2.2.2
  
  # 알림
  flutter_local_notifications: ^17.0.0
  
  # 라우팅
  go_router: ^13.0.0
  
  # 유틸리티
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
